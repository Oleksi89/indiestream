name: CI/CD Pipeline

on:
  push:
    # Trigger for stable and integration branches
    branches: [ main, dev ]
  pull_request:
    # Trigger for any branch that wants to merge into main or dev
    branches: [ main, dev ]

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    # Services required for integration tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        # Wait until PostgreSQL is ready to accept connections
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Install FFmpeg for AudioProcessingService
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start MinIO Service
        run: |
          docker run -d --name minio \
          -p 9000:9000 \
          -e MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }} \
          -e MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }} \
          minio/minio:RELEASE.2025-09-07T16-13-09Z server /data

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and Test
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: ./gradlew build

      # Saving generated architectural diagrams
      - name: Upload Architecture Diagrams
        uses: actions/upload-artifact@v4
        if: always() # Keep even if other tests fail
        with:
          name: spring-modulith-diagrams
          path: build/spring-modulith-docs/
          retention-days: 14

  frontend:
    name: Build & Check Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package.json

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        # Check TypeScript type compatibility before building
        run: npm run type-check

      - name: Build Frontend
        run: npm run build

      # Frontend Docker Image build is intentionally removed.
      # Vercel natively builds and serves the Vite application via its Edge Network.

  publish-and-deploy:
    name: Publish Image & Deploy to VPS
    needs: backend
    # Execute deployment ONLY on main branch push. Prevents unverified dev code in production.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Image Name
        run: echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/indiestream-backend" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/indiestream
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull backend
            docker compose up -d --no-deps backend
            docker image prune -f

  sync:
    name: Mirror to GitLab
    # only run if the backend and frontend are assembled without errors
    needs: [ backend, frontend ]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the entire commit history for a correct push

      - name: Push to GitLab Repository
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@git.ztu.edu.ua/ipz/2022-2026/ipz-22-3/vasyanovych-oleksandr/diploma-project.git
          git push gitlab HEAD:${{ github.ref_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true