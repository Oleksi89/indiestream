name: CI Pipeline

on:
  push:
    # Trigger for stable and integration branches
    branches: [ main, dev ]
  pull_request:
    # Trigger for any branch that wants to merge into main or dev
    branches: [ main, dev ]

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    # Services required for integration tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: indiestream
          POSTGRES_PASSWORD: indiestream_password
          POSTGRES_DB: indiestream_db
        ports:
          - 5432:5432
        # Wait until PostgreSQL is ready to accept connections
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Start MinIO Service
        run: |
          docker run -d --name minio \
          -p 9000:9000 \
          -e MINIO_ROOT_USER=indiestream_admin \
          -e MINIO_ROOT_PASSWORD=indiestream_secret \
          minio/minio:RELEASE.2025-09-07T16-13-09Z server /data

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and Test
        run: ./gradlew build

      - name: Build Backend Docker Image
        run: docker build -t indiestream-backend:latest .

  frontend:
    name: Build & Check Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package.json

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        # Check TypeScript type compatibility before building
        run: npm run type-check

      - name: Build Frontend
        run: npm run build

      - name: Build Frontend Docker Image
        run: docker build -t indiestream-frontend:latest .


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true