server:
  port: 8080

spring:
  application:
    name: indiestream

  profiles:
    active: dev

  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration

  # Infrastructure connections are shared across profiles as requested
  datasource:
    url: jdbc:postgresql://localhost:5432/indiestream_db
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 500MB

  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 50
      thread-name-prefix: media-worker-

  ai:
    retry:
      max-attempts: 1
    # Google GenAI for HITL & Moderation (Chat Model)
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
    # OpenAI for Recommendation Engine Embeddings (Vector Model)
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 768

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER}
  secret-key: ${MINIO_ROOT_PASSWORD}
  bucket: indiestream-tracks


resilience4j:
  retry:
    instances:
      openai-embedding:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
  circuitbreaker:
    instances:
      openai-embedding:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3