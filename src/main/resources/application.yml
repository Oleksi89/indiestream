server:
  port: 8080

spring:
  application:
    name: indiestream
  datasource:
    url: jdbc:postgresql://localhost:5432/indiestream_db
    username: indiestream
    password: indiestream_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
      # TODO: [Media] - Implement async FFmpeg transcoding pipeline for large lossless formats (WAV) to optimize network delivery

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 24 hours in ms

minio:
  url: http://localhost:9000
  access-key: indiestream_admin
  secret-key: indiestream_secret
  bucket: indiestream-tracks