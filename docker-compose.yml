services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: indiestream-postgres
    environment:
      POSTGRES_USER: indiestream
      POSTGRES_PASSWORD: indiestream_password
      POSTGRES_DB: indiestream_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: indiestream-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: indiestream-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: indiestream_admin
      MINIO_ROOT_PASSWORD: indiestream_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: