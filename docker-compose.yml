services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: indiestream-postgres
    environment:
      POSTGRES_USER: indiestream
      POSTGRES_PASSWORD: indiestream_password
      POSTGRES_DB: indiestream_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: indiestream-redis
    ports:
      - "6379:6379"
    restart: unless-stopped


volumes:
  postgres_data: